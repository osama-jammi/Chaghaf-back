version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  Chaghaf Backend — Full Production Stack
#  Services: SQL Server · Redis · Kafka · 9 Spring Boot µServices
# ═══════════════════════════════════════════════════════════════

networks:
  chaghaf-net:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  kafka-data:
  zookeeper-data:

# ── Shared env defaults ──────────────────────────────────────────
x-common-env: &common-env
  EUREKA_USER: ${EUREKA_USER:-admin}
  EUREKA_PASS: ${EUREKA_PASS:-chaghaf2025}
  DB_HOST: sqlserver
  DB_PORT: 1433
  DB_USER: ${DB_USER:-sa}
  DB_PASS: ${DB_PASS:-Chaghaf@2025!}
  JWT_SECRET: ${JWT_SECRET:-chaghaf-super-secret-key-2025-agadir-morocco-production}

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - chaghaf-net
  depends_on:
    discovery-service:
      condition: service_healthy
    sqlserver:
      condition: service_healthy

services:

  # ── SQL Server ───────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chaghaf-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASS:-Chaghaf@2025!}
      MSSQL_PID: Express
    ports:
      - "1433:1433"  # 🔧 Optionnel : retirer en production
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -b -o /dev/null
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chaghaf-redis
    command: redis-server --appendonly yes
    # 🔒 Port exposé retiré - interne uniquement
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: chaghaf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # 🔒 Pas de ports exposés
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: chaghaf-kafka
    depends_on:
      - zookeeper
    # 🔒 Port exposé retiré - communication interne seulement
    # ports:
    #   - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Discovery Service (Eureka) ────────────────────────────────
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: chaghaf-discovery
    ports:
      - "8761:8761"  # ✅ Gardé pour monitoring (peut être retiré en prod)
    environment:
      EUREKA_USER: ${EUREKA_USER:-admin}
      EUREKA_PASS: ${EUREKA_PASS:-chaghaf2025}
    healthcheck:
      test: wget -qO- http://admin:chaghaf2025@localhost:8761/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: chaghaf-gateway
    ports:
      - "8080:8080"  # ✅ SEUL point d'entrée externe
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - chaghaf-net
    restart: unless-stopped

  # 🔒 ── AUTH SERVICE ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: chaghaf-auth
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8081:8081"
    expose:
      - "8081"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_auth
    <<: *service-defaults

  # 🔒 ── SUBSCRIPTION SERVICE ──────────────────────────────────────
  subscription-service:
    build:
      context: ./subscription-service
      dockerfile: Dockerfile
    container_name: chaghaf-subscription
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8082:8082"
    expose:
      - "8082"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_subscription
    <<: *service-defaults

  # 🔒 ── RESERVATION SERVICE ───────────────────────────────────────
  reservation-service:
    build:
      context: ./reservation-service
      dockerfile: Dockerfile
    container_name: chaghaf-reservation
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8083:8083"
    expose:
      - "8083"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_reservation
    <<: *service-defaults

  # 🔒 ── BOISSON SERVICE ───────────────────────────────────────────
  boisson-service:
    build:
      context: ./boisson-service
      dockerfile: Dockerfile
    container_name: chaghaf-boisson
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8084:8084"
    expose:
      - "8084"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_boisson
    <<: *service-defaults

  # 🔒 ── SNACK SERVICE ─────────────────────────────────────────────
  snack-service:
    build:
      context: ./snack-service
      dockerfile: Dockerfile
    container_name: chaghaf-snack
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8085:8085"
    expose:
      - "8085"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_snack
    <<: *service-defaults

  # 🔒 ── SOCIAL SERVICE ────────────────────────────────────────────
  social-service:
    build:
      context: ./social-service
      dockerfile: Dockerfile
    container_name: chaghaf-social
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8086:8086"
    expose:
      - "8086"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_social
    <<: *service-defaults

  # 🔒 ── NOTIFICATION SERVICE ──────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: chaghaf-notification
    # ❌ Port exposé SUPPRIMÉ
    # ports:
    #   - "8087:8087"
    expose:
      - "8087"
    environment:
      <<: *common-env
      DB_NAME: chaghaf_notification
      FIREBASE_CREDENTIALS: /app/config/firebase-service-account.json
    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    depends_on:
      discovery-service:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - chaghaf-net
    restart: unless-stopped