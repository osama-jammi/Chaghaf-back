server:
  port: 8081

spring:
  application:
    name: api-gateway

  # ── Cloud Gateway ──────────────────────────────────────────────
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false   # On gère les routes manuellement
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "*"
      # ✅ Timeouts globaux
      httpclient:
        connect-timeout: 10000
        response-timeout: 30s
      routes:
        # ── AUTH SERVICE (pas de JwtAuthFilter sur /auth) ──────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # ── SUBSCRIPTION SERVICE ────────────────────────────────────
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**,/api/packs/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── RESERVATION SERVICE ─────────────────────────────────────
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/reservations/**,/api/salles/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── BOISSON SERVICE ─────────────────────────────────────────
        - id: boisson-service
          uri: lb://boisson-service
          predicates:
            - Path=/api/boissons/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── SNACK SERVICE ───────────────────────────────────────────
        - id: snack-service
          uri: lb://snack-service
          predicates:
            - Path=/api/snacks/**,/api/orders/**,/api/panier/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── SOCIAL SERVICE ──────────────────────────────────────────
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/posts/**,/api/messages/**,/api/conversations/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── NOTIFICATION SERVICE ────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

    # ✅ LoadBalancer : désactive le cache Ribbon (Spring Boot 3)
    loadbalancer:
      ribbon:
        enabled: false
      cache:
        enabled: true

  # ── Redis ────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 5000ms

# ── Eureka ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASS:chaghaf2025}@${EUREKA_HOST:discovery-service}:8761/eureka/
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ── JWT ─────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:chaghaf-super-secret-key-2025-agadir-morocco-production}

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    ma.chaghaf.gateway: DEBUG
    reactor.netty: INFO