server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ✅ Désactiver Redis tant qu'il n'est pas utilisé
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**,/api/packs/**
          filters:
            - JwtAuthFilter

        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/reservations/**,/api/salles/**
          filters:
            - JwtAuthFilter

        - id: boisson-service
          uri: lb://boisson-service
          predicates:
            - Path=/api/boissons/**
          filters:
            - JwtAuthFilter

        - id: snack-service
          uri: lb://snack-service
          predicates:
            - Path=/api/snacks/**,/api/orders/**,/api/panier/**
          filters:
            - JwtAuthFilter

        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/posts/**,/api/messages/**,/api/conversations/**
          filters:
            - JwtAuthFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthFilter

eureka:
  client:
    service-url:
      defaultZone: http://admin:chaghaf2025@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG